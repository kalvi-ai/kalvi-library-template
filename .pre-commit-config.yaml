# See https://pre-commit.com for more
# Enable hooks: uv run pre-commit install && uv run pre-commit install --hook-type commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb", "500"]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.2
    hooks:
      - id: actionlint
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.15.0
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]
  - repo: https://github.com/crate-ci/typos
    rev: v1.26.0
    hooks:
      - id: typos
  - repo: local
    hooks:
      - id: check-doc-filenames
        name: check doc filenames (kebab under docs/)
        entry: uv run python scripts/check-doc-filenames.py
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests scripts
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src tests scripts
        language: system
        pass_filenames: false
      - id: commitizen
        name: commit message (conventional)
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true
