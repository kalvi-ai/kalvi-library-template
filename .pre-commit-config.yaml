# See https://pre-commit.com for more
# Enable hooks: uv run pre-commit install && uv run pre-commit install --hook-type commit-msg
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src tests
        language: system
        pass_filenames: false
  - repo: local
    hooks:
      - id: commitizen
        name: commit message (conventional)
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true
