[mcp_servers.github]
command = "npx"
args = [ "-y", "@modelcontextprotocol/server-github" ]

  [mcp_servers.github.env]
  GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}"

[mcp_servers.exa]
command = "npx"
args = [ "-y", "mcp-remote@latest", "https://mcp.exa.ai/mcp" ]

[mcp_servers.context7]
command = "npx"
args = [ "-y", "mcp-remote@latest", "https://mcp.context7.com/mcp" ]

  [mcp_servers.context7.headers]
  CONTEXT7_API_KEY = "${CONTEXT7_API_KEY}"

[mcp_servers.skillz]
command = "uvx"
args = [
  "skillz@latest",
  "/Users/gg/Work/Kalvi/kalvi-library-template/.skillz"
]
