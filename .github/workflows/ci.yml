name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Tests and coverage
        run: uv run pytest --cov=src/kalvi_library_template --cov-report=term-missing --cov-fail-under=80

      - name: Ruff check
        run: uv run ruff check src tests scripts

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

      - name: Pylint
        run: uv run pylint src/kalvi_library_template scripts

      - name: Mypy
        run: uv run mypy src/kalvi_library_template scripts

      - name: Bandit
        run: uv run bandit -r src/kalvi_library_template

      - name: pip-audit
        run: uv run pip-audit

      - name: Pre-commit
        run: uv run pre-commit run --all-files

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress 'docs/**/*.md' '*.md'
          fail: true

  test-optional-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies and [config] extra
        run: uv sync --frozen --group dev --extra config

      - name: Test optional [config] extra
        env:
          REQUIRE_CONFIG_EXTRA: "1"
        run: uv run pytest tests/test_optional_config.py -v
