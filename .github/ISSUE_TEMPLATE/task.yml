name: Task
description: New feature or improvement
title: "[Task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: "Describe the task. Acceptance criteria define when it's done."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be done
      placeholder: Short description
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we know it's done
      placeholder: "- [ ] Criterion 1\n- [ ] Criterion 2"
  - type: textarea
    id: refs
    attributes:
      label: References
      description: Links, related issues (optional)
      required: false
